<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapılacaklar Listesi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Yapılacaklar Listesi</h1>
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="Yeni görev ekle..." autocomplete="off">
            <button type="submit">Ekle</button>
        </form>
        <ul id="todo-list"></ul>
        <div id="footer" class="hidden">
            <span id="count"></span>
            <button id="clear-completed">Tamamlananları Temizle</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
