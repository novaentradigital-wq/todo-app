<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Yapılacaklar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container auth-container">
        <div class="auth-icon">&#10003;</div>
        <h1>Yapılacaklar Listesi</h1>
        <p class="auth-subtitle">Görevlerinizi takip edin</p>

        <div id="auth-message" class="auth-message hidden"></div>

        <form id="auth-form">
            <div class="input-group">
                <label for="auth-email">E-posta</label>
                <input type="email" id="auth-email" placeholder="ornek@mail.com" required>
            </div>
            <div class="input-group">
                <label for="auth-password">Şifre</label>
                <input type="password" id="auth-password" placeholder="En az 6 karakter" required minlength="6">
            </div>
            <button type="submit" id="auth-submit-btn" class="btn-primary">Giriş Yap</button>
        </form>

        <div class="auth-divider"><span>veya</span></div>

        <p class="auth-toggle">
            <span id="auth-toggle-text">Hesabınız yok mu?</span>
            <a href="#" id="auth-toggle-link">Kayıt Ol</a>
        </p>
    </div>

    <script src="auth.js"></script>
</body>
</html>
